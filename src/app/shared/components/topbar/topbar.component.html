<header class="topbar">
  <div class="d-flex justify-content-between align-items-center w-100">
    <!-- Brand -->
    <a routerLink="/admin/dashboard" class="navbar-brand me-3">
      <span class="fw-bold topbar-brand">MyBuddy</span>
    </a>

    <!-- Search (optional, hidden on mobile) -->
    <div class="flex-grow-1 mx-3 d-none d-md-block search-wrapper">
      <div class="input-group">
        <input type="text" class="form-control" placeholder="Search anything...">
        <button class="btn btn-outline-secondary" type="button">
          <i class="bi bi-search"></i>
        </button>
      </div>
    </div>

    <!-- Right Section -->
    <div class="d-flex align-items-center gap-3">
      <!-- Mobile Menu Toggle -->
      <button class="btn btn-outline-secondary d-md-none" type="button" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <i class="bi bi-list"></i>
      </button>

      <!-- Notifications -->
      <div class="dropdown" [class.show]="showNotifications">
        <button class="btn btn-outline-secondary position-relative" type="button" (click)="toggleNotifications()">
          <i class="bi bi-bell"></i>
          <span *ngIf="getUnreadCount() > 0" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger notification-badge">
            {{getUnreadCount()}}
          </span>
        </button>
        <div class="dropdown-menu dropdown-menu-end" *ngIf="showNotifications">
          <div class="px-3 py-2 border-bottom dropdown-header-custom">
            <h6 class="mb-0 fw-semibold">Notifications</h6>
          </div>
          <div class="p-2 notification-list">
            <div *ngFor="let notif of notifications" class="d-flex align-items-start mb-2 p-2 rounded notification-item">
              <div class="flex-shrink-0">
                <i class="bi bi-info-circle text-primary"></i>
              </div>
              <div class="flex-grow-1 ms-2">
                  <div class="fw-medium small">{{notif.message}}</div>
                  <div class="text-muted small text-time">{{notif.time}}</div>
              </div>
            </div>
            <div *ngIf="notifications.length === 0" class="text-center text-muted py-3 small">
              No notifications
            </div>
          </div>
        </div>
      </div>

      <!-- User Profile -->
      <div class="dropdown" [class.show]="showUserMenu">
        <button class="dropdown-toggle d-flex align-items-center gap-2" type="button" (click)="toggleUserMenu()">
          <span class="user-avatar">{{userInitials}}</span>
          <span class="d-none d-md-inline fw-medium">{{userName}}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" *ngIf="showUserMenu">
          <li><a class="dropdown-item" href="#" (click)="goToProfile()"><i class="bi bi-person me-2"></i> Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" href="#" (click)="logout()"><i class="bi bi-box-arrow-left me-2"></i> Logout</a></li>
        </ul>
      </div>
    </div>
  </div>
</header>
