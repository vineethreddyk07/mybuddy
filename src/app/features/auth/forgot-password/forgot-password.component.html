<div class="forgot-password-page d-flex align-items-center justify-content-center">
  <div class="w-100 login-form-wrapper">
    <div class="text-center mb-4">
      <h2 class="fw-bold brand-title">MyBuddy</h2>
      <p class="text-muted">Reset your password</p>
    </div>

    <div class="card border-0 shadow-lg forgot-password-card">
      <div class="card-body p-4">
        <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
          <div class="mb-4">
            <label for="email" class="form-label fw-medium">Email address</label>
            <div class="input-group forgot-input-group">
              <span class="input-group-text">
                <i class="bi bi-envelope text-muted"></i>
              </span>
              <input type="email" class="form-control" id="email" formControlName="email" placeholder="name@company.com">
            </div>
            <div class="invalid-feedback d-block mt-1 forgot-feedback" *ngIf="forgotPasswordForm.get('email')?.touched && forgotPasswordForm.get('email')?.invalid">
              Please enter a valid email address.
            </div>
          </div>

          <div class="d-grid gap-2 mb-3">
            <button type="submit" class="btn btn-outline-primary py-2 fw-medium" [disabled]="forgotPasswordForm.pending || isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
              Send Reset Link
            </button>
          </div>
        </form>

        <div class="text-center">
          <p class="text-success small mb-2" *ngIf="successMessage">{{successMessage}}</p>
          <p class="text-danger small mb-2" *ngIf="errorMessage">{{errorMessage}}</p>
          <a routerLink="/login" class="text-muted text-decoration-none small">Remember password? Sign In</a>
        </div>
      </div>
    </div>
  </div>
</div>
