<div class="dashboard">
  <div class="form-section">
    <h2>New Claim Form</h2>
    
    <form [formGroup]="claimForm">
      <div class="card">
        <h3>Basic Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label for="patientName">Patient Name *</label>
            <input id="patientName" type="text" formControlName="patientName" />
          </div>
          <div class="form-group">
            <label for="claimId">Claim ID *</label>
            <input id="claimId" type="text" formControlName="claimId" />
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="payer">Payer *</label>
            <select id="payer" formControlName="payer">
              <option value="">Select Payer</option>
              @for (payer of payerOptions; track payer) {
                <option [value]="payer">{{ payer }}</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label for="callDate">Call Date *</label>
            <input id="callDate" type="date" formControlName="callDate" />
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Claim Status *</h3>
        <div class="form-group">
          <select formControlName="status">
            <option value="">Select Status</option>
            @for (status of claimStatuses; track status) {
              <option [value]="status">{{ status }}</option>
            }
          </select>
        </div>
      </div>

      @if (status === 'Paid') {
        <div class="card conditional-section">
          <h3>Paid Details</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="paidAmount">Paid Amount</label>
              <input id="paidAmount" type="number" formControlName="paidAmount" />
            </div>
            <div class="form-group">
              <label for="paymentDate">Payment Date</label>
              <input id="paymentDate" type="date" formControlName="paymentDate" />
            </div>
          </div>
          <div class="form-group">
            <label for="paymentReference">Payment Reference</label>
            <input id="paymentReference" type="text" formControlName="paymentReference" />
          </div>
        </div>
      }

      @if (status === 'Denied') {
        <div class="card conditional-section">
          <h3>Denial Details</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="denialReason">Denial Reason</label>
              <select id="denialReason" formControlName="denialReason">
                <option value="">Select Reason</option>
                @for (reason of denialReasons; track reason) {
                  <option [value]="reason">{{ reason }}</option>
                }
              </select>
            </div>
            <div class="form-group">
              <label for="appealAllowed">Appeal Allowed</label>
              <select id="appealAllowed" formControlName="appealAllowed">
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="referenceNumber">Reference Number</label>
            <input id="referenceNumber" type="text" formControlName="referenceNumber" />
          </div>
        </div>
      }

      @if (status === 'Partial') {
        <div class="card conditional-section">
          <h3>Partial Payment Details</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="paidAmountPartial">Paid Amount</label>
              <input id="paidAmountPartial" type="number" formControlName="paidAmount" />
            </div>
            <div class="form-group">
              <label for="remainingAmount">Remaining Amount</label>
              <input id="remainingAmount" type="number" formControlName="remainingAmount" />
            </div>
          </div>
        </div>
      }

      <div class="card">
        <h3>Notes</h3>
        <div class="form-group">
          <textarea formControlName="notes" rows="4" placeholder="Add any notes here..."></textarea>
        </div>
      </div>
    </form>

    <div class="actions">
      <button class="btn-secondary" (click)="saveDraft()">Save Draft</button>
      <button class="btn-primary" (click)="submit()">Submit</button>
    </div>
  </div>

  <div class="preview-section">
    <div class="card">
      <h3>Live Report Preview</h3>
      <pre class="report">{{ generateReport() }}</pre>
      <button class="btn-copy" (click)="copyReport()">Copy Report</button>
    </div>
  </div>
</div>
