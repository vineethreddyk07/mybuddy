<div class="container-fluid px-4">
  <!-- Page Header -->
  <app-page-header title="Users" subtitle="Manage user accounts"></app-page-header>

  <!-- Search and Filters -->
  <div class="row mb-4">
    <div class="col-md-4 mb-3">
      <div class="input-group">
        <input type="text" class="form-control" placeholder="Search users..." [(ngModel)]="searchTerm" (ngModelChange)="onSearch()">
        <button class="btn btn-outline-secondary" type="button" (click)="onSearch()">
          <i class="bi bi-search"></i>
        </button>
      </div>
    </div>
    <div class="col-md-2 mb-3">
      <select class="form-select" [(ngModel)]="selectedTeam" (ngModelChange)="onFilter()">
        <option value="">All Teams</option>
        <option *ngFor="let team of teams">{{team}}</option>
      </select>
    </div>
    <div class="col-md-2 mb-3">
      <select class="form-select" [(ngModel)]="selectedRole" (ngModelChange)="onFilter()">
        <option value="">All Roles</option>
        <option *ngFor="let role of roles">{{role}}</option>
      </select>
    </div>
    <div class="col-md-2 mb-3">
      <select class="form-select" [(ngModel)]="selectedStatus" (ngModelChange)="onFilter()">
        <option value="">All Status</option>
        <option *ngFor="let status of statuses">{{status}}</option>
      </select>
    </div>
    <div class="col-md-2 d-grid mb-3">
      <button class="btn btn-primary" type="button" routerLink="/admin/users/create">
        <i class="bi bi-plus me-1"></i> New User
      </button>
    </div>
  </div>

  <!-- Users Table -->
  <div class="card shadow-sm">
    <div class="card-header">
      <h5 class="mb-0">User List</h5>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Team</th>
              <th>Role</th>
              <th>Status</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of paginatedUsers">
              <td>{{user.name}}</td>
              <td>{{user.email}}</td>
              <td>{{user.team}}</td>
              <td>
                <span class="badge bg-{{getRoleColor(user.role)}}">{{user.role}}</span>
              </td>
              <td>
                <span class="badge bg-{{getStatusColor(user.status)}}">{{user.status}}</span>
              </td>
              <td class="text-end">
                <div class="btn-group">
                  <button type="button" class="btn btn-sm btn-outline-primary" [routerLink]="['/admin/users/edit', user.id]">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-danger" (click)="deleteUser(user.id)">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="paginatedUsers.length === 0">
              <td colspan="6" class="text-center py-4">No users found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="d-flex justify-content-between align-items-center mt-3">
    <p class="mb-0 text-muted">
      Showing {{paginatedUsers.length}} of {{totalItems}} users
    </p>
    <nav aria-label="Page navigation">
      <ul class="pagination">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <a class="page-link" href="#" (click)="onPageChange(currentPage - 1); $event.preventDefault()">Previous</a>
        </li>
        <li class="page-item" *ngFor="let p of paginate(); trackBy: trackByIndex" [class.active]="p === currentPage">
          <a class="page-link" href="#" (click)="onPageChange(p); $event.preventDefault()">{{p}}</a>
        </li>
        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <a class="page-link" href="#" (click)="onPageChange(currentPage + 1); $event.preventDefault()">Next</a>
        </li>
      </ul>
    </nav>
  </div>
</div>
