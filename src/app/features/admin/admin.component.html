<div class="admin">
  <h2>Admin Configuration</h2>
  
  <div class="card">
    <h3>Scenario Configuration</h3>
    <p>Configure dynamic form fields for claim scenarios.</p>
    
    <table class="fields-table">
      <thead>
        <tr>
          <th>Field Name</th>
          <th>Type</th>
          <th>Options</th>
        </tr>
      </thead>
      <tbody>
        @for (field of fields; track $index) {
          <tr>
            <td>{{ field.fieldName }}</td>
            <td>{{ field.type }}</td>
            <td>{{ field.options || '-' }}</td>
          </tr>
        }
      </tbody>
    </table>
    
    <button class="btn-add" (click)="addField()">Add Field</button>
  </div>
</div>
