<div class="container-fluid px-4">
  <!-- Page Header -->
  <app-page-header title="Dashboard" subtitle="Overview of key metrics"></app-page-header>

  <!-- Stats Cards -->
  <div class="row mb-4">
    <div class="col-sm-6 col-lg-2 mb-3" *ngFor="let stat of stats">
      <div class="card text-white bg-{{stat.color}} h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h6 class="mb-0">{{stat.title}}</h6>
            </div>
            <div>
              <i class="{{stat.icon}} fs-3"></i>
            </div>
          </div>
          <h4 class="mt-2 mb-0">{{stat.value}}</h4>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts and Recent Activity -->
  <div class="row">
    <!-- Charts Column -->
    <div class="col-lg-8 mb-4">
      <div class="row">
        <!-- Claims by Status -->
        <div class="col-md-6 mb-3">
          <div class="card h-100">
            <div class="card-header">
              <h5 class="mb-0">Claims by Status</h5>
            </div>
            <div class="card-body p-3">
              <!-- Placeholder for chart -->
              <div class="ratio ratio-16x9">
                <div class="bg-light d-flex align-items-center justify-content-center">
                  <div class="text-muted">Chart Placeholder</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- Claims by Team -->
        <div class="col-md-6 mb-3">
          <div class="card h-100">
            <div class="card-header">
              <h5 class="mb-0">Claims by Team</h5>
            </div>
            <div class="card-body p-3">
              <!-- Placeholder for chart -->
              <div class="ratio ratio-16x9">
                <div class="bg-light d-flex align-items-center justify-content-center">
                  <div class="text-muted">Chart Placeholder</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- Weekly Productivity -->
        <div class="col-12 mb-3">
          <div class="card h-100">
            <div class="card-header">
              <h5 class="mb-0">Weekly Productivity</h5>
            </div>
            <div class="card-body p-3">
              <!-- Placeholder for chart -->
              <div class="ratio ratio-16x9">
                <div class="bg-light d-flex align-items-center justify-content-center">
                  <div class="text-muted">Chart Placeholder</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent Activity Column -->
    <div class="col-lg-4">
      <div class="card h-100">
        <div class="card-header">
          <h5 class="mb-0">Recent Activity</h5>
        </div>
        <div class="card-body p-0">
          <div class="list-group list-group-flush">
            <div class="list-group-item" *ngFor="let activity of recentActivity">
              <div class="d-flex w-100 justify-content-between">
                <h6 class="mb-1">{{activity.user}}</h6>
                <small class="text-muted">{{activity.time}}</small>
              </div>
              <p class="mb-1">{{activity.action}}</p>
              <small *ngIf="activity.claimId !== '-'" >Claim ID: {{activity.claimId}}</small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
