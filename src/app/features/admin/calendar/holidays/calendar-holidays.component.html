<div class="container-fluid px-4">
  <!-- Page Header -->
  <app-page-header title="Holidays" subtitle="Manage company and public holidays"></app-page-header>

  <!-- Search and Filters -->
  <div class="row mb-4">
    <div class="col-md-4 mb-3">
      <div class="input-group">
        <input type="text" class="form-control" placeholder="Search holidays..." [(ngModel)]="searchTerm" (ngModelChange)="onSearch()">
        <button class="btn btn-outline-secondary" type="button" (click)="onSearch()">
          <i class="bi bi-search"></i>
        </button>
      </div>
    </div>
    <div class="col-md-2 mb-3">
      <select class="form-select" [(ngModel)]="selectedType" (ngModelChange)="onFilter()">
        <option value="">All Types</option>
        <option *ngFor="let type of types">{{type}}</option>
      </select>
    </div>
    <div class="col-md-2 d-grid mb-3">
      <button class="btn btn-primary" type="button" (click)="createHoliday()">
        <i class="bi bi-plus me-1"></i> New Holiday
      </button>
    </div>
  </div>

  <!-- Holidays Table -->
  <div class="card shadow-sm">
    <div class="card-header">
      <h5 class="mb-0">Holidary List</h5>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Holiday Name</th>
              <th>Date</th>
              <th>Type</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let holiday of paginatedHolidays">
              <td>{{holiday.name}}</td>
              <td>{{holiday.date}}</td>
              <td>
                <span class="badge bg-{{getTypeColor(holiday.type)}}">{{holiday.type}}</span>
              </td>
              <td class="text-end">
                <div class="btn-group">
                  <button type="button" class="btn btn-sm btn-outline-primary" [routerLink]="['/admin/calendar/holidays/edit', holiday.id]">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-danger" (click)="deleteHoliday(holiday.id)">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="paginatedHolidays.length === 0">
              <td colspan="4" class="text-center py-4">No holidays found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="d-flex justify-content-between align-items-center mt-3">
    <p class="mb-0 text-muted">
      Showing {{paginatedHolidays.length}} of {{totalItems}} holidays
    </p>
    <nav aria-label="Page navigation">
      <ul class="pagination">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <a class="page-link" href="#" (click)="onPageChange(currentPage - 1); $event.preventDefault()">Previous</a>
        </li>
        <li class="page-item" *ngFor="let p of paginate(); trackBy: trackByIndex" [class.active]="p === currentPage">
          <a class="page-link" href="#" (click)="onPageChange(p); $event.preventDefault()">{{p}}</a>
        </li>
        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <a class="page-link" href="#" (click)="onPageChange(currentPage + 1); $event.preventDefault()">Next</a>
        </li>
      </ul>
    </nav>
  </div>
</div>
